version: '3.8'

services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - VITE_API_URL=${VITE_API_URL}
        - VITE_CF_CLIENT_ID=${VITE_CF_ACCESS_CLIENT_ID}
        - VITE_CF_CLIENT_SECRET=${VITE_CF_ACCESS_CLIENT_SECRET}
        - VITE_CF_ACCESS_TOKEN=${VITE_CF_ACCESS_TOKEN}
    ports:
      - "3000:3000"
    environment:
      - VITE_FRONTEND_URL=${VITE_FRONTEND_URL}
      - VITE_API_URL=${VITE_API_URL}
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS}
      # Cloudflare Access Service Auth
      - VITE_CF_CLIENT_ID=${VITE_CF_ACCESS_CLIENT_ID}
      - VITE_CF_CLIENT_SECRET=${VITE_CF_ACCESS_CLIENT_SECRET}
      - VITE_CF_ACCESS_TOKEN=${VITE_CF_ACCESS_TOKEN}
    depends_on:
      - backend

  docker-daemon:
    image: docker:dind
    privileged: true
    environment:
      - DOCKER_TLS_CERTDIR=""  # Disable TLS for simplicity
    # IMPORTANT: arg 1 must literally be `dockerd`. The docker:dind
    # entrypoint does critical setup (tini as pid 1, iptables modprobe,
    # stale PID cleanup, cgroup v2 prep) only when it recognises that
    # shape — wrapping in `sh -c` bypasses all of it and leaves the
    # cgroup hierarchy half-configured, breaking any `--memory`/`--cpus`
    # containers. To enable userns-remap or other daemon flags, edit
    # ./security/daemon.json (mounted read-only into /etc/docker/ below).
    command: ["dockerd", "--host=tcp://0.0.0.0:2376", "--host=unix:///var/run/docker.sock"]
    volumes:
      # Ship the seccomp profile (and any future AppArmor/policy files)
      # onto the dind filesystem so `docker run --security-opt seccomp=…`
      # resolves against a path dockerd can read (it also has to be on
      # the client side — see backend service). Mounted read-only so a
      # compromised dind process can't tamper with the profile.
      - ./security:/etc/supakiln:ro
      # Optional dockerd config file. If present and non-empty it is
      # picked up at dockerd startup; userns-remap lives here. Template
      # in repo at security/daemon.json.example.
      - ./security/daemon.json:/etc/docker/daemon.json:ro
    deploy:
      resources:
        limits:
          memory: 4g
          cpus: "2.0"
        reservations:
          memory: 512m
    healthcheck:
      test: ["CMD", "docker", "info"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - .:/app
      # Docker's `--security-opt seccomp=…` path is resolved by the
      # client, not the daemon — the backend reads the profile content
      # and sends it in the API call. Mount the same ro path here as
      # on docker-daemon so both sides agree on /etc/supakiln/.
      - ./security:/etc/supakiln:ro
    environment:
      - DOCKER_HOST=tcp://docker-daemon:2376
      - BACKEND_URL=${BACKEND_URL}
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS}
      - ENVIRONMENT=${ENVIRONMENT:-production}
      # Container security settings
      - CONTAINER_NETWORK_MODE=${CONTAINER_NETWORK_MODE:-none}  # 'none' for isolation, 'bridge' for network access
      # Worker lifecycle tuning — see README/docs.
      - SUPAKILN_WORKER_IDLE_TTL_SECONDS=${SUPAKILN_WORKER_IDLE_TTL_SECONDS:-1800}
      - SUPAKILN_WORKER_REAPER_INTERVAL_SECONDS=${SUPAKILN_WORKER_REAPER_INTERVAL_SECONDS:-60}
      - SUPAKILN_CONTAINER_TMPFS_SIZE=${SUPAKILN_CONTAINER_TMPFS_SIZE:-128m}
      - SUPAKILN_HOME_TMPFS_SIZE=${SUPAKILN_HOME_TMPFS_SIZE:-256m}
      # Per-user-container resource caps. These are the knobs the
      # hardening layer reads when rendering `docker run` for user code.
      # Leave defaults unless you have a specific reason to loosen them.
      - SUPAKILN_MEMORY_LIMIT=${SUPAKILN_MEMORY_LIMIT:-512m}
      - SUPAKILN_MEMORY_SWAP=${SUPAKILN_MEMORY_SWAP:-}  # defaults to =memory-limit (disables swap evasion)
      - SUPAKILN_CPU_LIMIT=${SUPAKILN_CPU_LIMIT:-0.5}
      - SUPAKILN_PIDS_LIMIT=${SUPAKILN_PIDS_LIMIT:-100}
      - SUPAKILN_NOFILE_LIMIT=${SUPAKILN_NOFILE_LIMIT:-512}
      # Seccomp profile path as seen by the dind daemon. Mounted from
      # ./security/ via the docker-daemon service's volume.
      - SUPAKILN_SECCOMP_PROFILE_PATH=${SUPAKILN_SECCOMP_PROFILE_PATH:-/etc/supakiln/seccomp.json}
      # AppArmor profile name. Leave empty to keep Docker's default
      # profile; set to a loaded profile name for DiD.
      - SUPAKILN_APPARMOR_PROFILE=${SUPAKILN_APPARMOR_PROFILE:-}
      # Cooked-container reaper. Probes /health on every worker on an
      # interval; evicts ones reporting cgroup pressure >= threshold or
      # unreachable. Set interval to 0 to disable.
      - SUPAKILN_COOKED_REAPER_INTERVAL_SECONDS=${SUPAKILN_COOKED_REAPER_INTERVAL_SECONDS:-30}
      - SUPAKILN_COOKED_THRESHOLD_PCT=${SUPAKILN_COOKED_THRESHOLD_PCT:-90}
      # Caps. MAX_WORKERS is the global ceiling; MAX_WORKERS_PER_USER
      # keeps one tenant from monopolising. Exceeding a cap triggers
      # synchronous LRU eviction of an idle worker; if none are idle,
      # /execute returns 429 (per-user) or 503 (global).
      - SUPAKILN_MAX_WORKERS=${SUPAKILN_MAX_WORKERS:-50}
      - SUPAKILN_MAX_WORKERS_PER_USER=${SUPAKILN_MAX_WORKERS_PER_USER:-5}
      # Background pressure reaper. Reads host /proc/meminfo + loadavg
      # and evicts LRU idle workers when either is above its high water.
      # Set interval to 0 to disable.
      - SUPAKILN_PRESSURE_REAPER_INTERVAL_SECONDS=${SUPAKILN_PRESSURE_REAPER_INTERVAL_SECONDS:-30}
      - SUPAKILN_MEMORY_HIGH_WATER_PCT=${SUPAKILN_MEMORY_HIGH_WATER_PCT:-85}
      - SUPAKILN_MEMORY_LOW_WATER_PCT=${SUPAKILN_MEMORY_LOW_WATER_PCT:-70}
      # CPU high water is a 1-minute load average. Default = nproc * 1.5
      # in code if this is unset.
      - SUPAKILN_CPU_HIGH_WATER=${SUPAKILN_CPU_HIGH_WATER:-}
      # Auth — first admin is created from these on startup if no
      # admin exists yet. Leaving both unset skips bootstrap.
      - SUPAKILN_BOOTSTRAP_ADMIN_EMAIL=${SUPAKILN_BOOTSTRAP_ADMIN_EMAIL:-}
      - SUPAKILN_BOOTSTRAP_ADMIN_PASSWORD=${SUPAKILN_BOOTSTRAP_ADMIN_PASSWORD:-}
      # While true (default during transition), unauthenticated requests
      # are attributed to the system user instead of being rejected.
      # Flip to false once all clients send bearer tokens or session
      # cookies.
      - SUPAKILN_ALLOW_ANONYMOUS=${SUPAKILN_ALLOW_ANONYMOUS:-true}
    depends_on:
      docker-daemon:
        condition: service_healthy 